<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DronePharm | Drones</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-bg"></div>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-mark">DP</div>
      <div>
        <p class="eyebrow">Fleet office</p>
        <h1>Drones</h1>
      </div>

      <nav class="nav-menu">
        <a class="nav-link" href="/index.html"><strong>Visao geral</strong></a>
        <a class="nav-link" href="/mapa.html"><strong>Mapa interativo</strong></a>
        <a class="nav-link" href="/pedidos.html"><strong>Pedidos</strong></a>
        <a class="nav-link active" href="/drones.html"><strong>Drones</strong></a>
        <a class="nav-link" href="/farmacias.html"><strong>Farmacias</strong></a>
        <a class="nav-link" href="/operacoes.html"><strong>Operacoes</strong></a>
      </nav>
    </aside>

    <main class="page-main">
      <section class="page-header card">
        <div class="page-header-top">
          <div>
            <p class="eyebrow">Governanca da frota</p>
            <h1>Cadastro de drones</h1>
          </div>
          <section class="config-panel">
            <span class="config-tag">Fleet admin</span>
            <span id="backend-label" class="backend-label">Carregando backend...</span>
            <div class="status-panel">
              <span id="connection-pill" class="pill neutral">Desconectado</span>
              <span class="meta-note">Ultima sincronizacao: <strong id="last-update">--:--:--</strong></span>
            </div>
          </section>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Alertas operacionais</h2>
        </div>
        <ul id="alerts-list" class="alerts-list"></ul>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Novo drone</h2>
        </div>
        <form id="drone-form" class="form-grid">
          <label>ID <input name="id" type="text" required placeholder="DP-10"></label>
          <label>Nome <input name="nome" type="text" required placeholder="DronePharm-10"></label>
          <label>Capacidade (kg) <input name="capacidade_max_kg" type="number" min="0.1" step="0.1" value="2"></label>
          <label>Autonomia (km) <input name="autonomia_max_km" type="number" min="0.1" step="0.1" value="10"></label>
          <label class="full">Velocidade (m/s) <input name="velocidade_ms" type="number" min="0.1" step="0.1" value="10"></label>
          <button type="submit" class="full">Cadastrar drone</button>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Frota cadastrada</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Nome</th><th>Status</th><th>Bateria</th><th>Acao</th></tr>
            </thead>
            <tbody id="drones-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/pages/drones.js"></script>
</body>
</html>
